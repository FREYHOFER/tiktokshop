# One-off trigger created from ChatGPT on 2026-07-09.
name: Submit prepared Libri order 28882135784

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/libri-submit-28882135784.yml"
      - "scripts/libri_customer_submit.py"
  workflow_dispatch:

concurrency:
  group: libri-submit-28882135784
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  submit-libri-order:
    runs-on: ubuntu-latest
    environment: shop
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create local Libri env file
        env:
          LIBRI_CUSTOMER_NUMBER: ${{ secrets.LIBRI_CUSTOMER_NUMBER }}
          LIBRI_USERNAME: ${{ secrets.LIBRI_USERNAME }}
          LIBRI_PASSWORD: ${{ secrets.LIBRI_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          required = ["LIBRI_CUSTOMER_NUMBER", "LIBRI_USERNAME", "LIBRI_PASSWORD"]
          missing = [key for key in required if not os.environ.get(key)]
          if missing:
              raise SystemExit("Missing Libri secret(s): " + ", ".join(missing))
          with open(".env", "w", encoding="utf-8") as env_file:
              for key in required:
                  env_file.write(f"{key}={os.environ[key]}\n")
          PY

      - name: Download prepared order package
        uses: actions/download-artifact@v7
        with:
          name: libri-order-packages-28882135784
          run-id: 28882135784
          repository: FREYHOFER/tiktokshop
          github-token: ${{ github.token }}
          path: downloaded-order-package

      - name: Locate prepared order
        id: find-order
        run: |
          ORDER_JSON="$(find downloaded-order-package -name tiktok_order.json -print -quit)"
          if [ -z "$ORDER_JSON" ]; then
            echo "Could not find tiktok_order.json in downloaded artifact."
            exit 1
          fi
          ORDER_DIR="$(dirname "$ORDER_JSON")"
          echo "order_dir=$ORDER_DIR" >> "$GITHUB_OUTPUT"
          echo "Prepared order directory found."

      - name: Submit to Libri
        run: |
          python scripts/libri_customer_submit.py \
            --order-dir "${{ steps.find-order.outputs.order_dir }}" \
            --env .env

      - name: Upload Libri submission audit
        if: always() && steps.find-order.outputs.order_dir != ''
        uses: actions/upload-artifact@v7
        with:
          name: libri-submission-audit-${{ github.run_id }}
          path: ${{ steps.find-order.outputs.order_dir }}/libri_submission/
          retention-days: 14

      - name: Comment on prepared-order issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          status = os.environ.get("JOB_STATUS", "unknown")
          run_url = os.environ["RUN_URL"]
          if status == "success":
              body = (
                  "Libri submission workflow completed successfully for prepared package "
                  "`libri-order-packages-28882135784`.\n\n"
                  f"Audit artifact: `libri-submission-audit-{os.environ['GITHUB_RUN_ID']}`\n"
                  f"Run: {run_url}"
              )
          else:
              body = (
                  "Libri submission workflow did not complete successfully for prepared package "
                  "`libri-order-packages-28882135784`.\n\n"
                  "No customer address data is included here. Check the workflow run and audit artifact.\n"
                  f"Run: {run_url}"
              )

          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/4/comments",
              data=json.dumps({"body": body}).encode("utf-8"),
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json",
                  "User-Agent": "libri-submit-workflow",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              response.read()
          PY
