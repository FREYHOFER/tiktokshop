name: TikTok order automation

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tiktok-order-automation.yml"
      - "requirements.txt"
      - "scripts/**"
  schedule:
    # GitHub cron uses UTC. In Germany this is 09:30 during summer time and 08:30 during winter time.
    - cron: "30 7 * * *"
  workflow_dispatch:

concurrency:
  group: tiktok-order-automation
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  prepare-orders:
    runs-on: ubuntu-latest
    environment: shop
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check required automation secrets
        id: required-secrets
        env:
          LIBRI_CUSTOMER_NUMBER: ${{ secrets.LIBRI_CUSTOMER_NUMBER }}
          LIBRI_USER: ${{ secrets.LIBRI_USERNAME }}
          LIBRI_PASS: ${{ secrets.LIBRI_PASSWORD }}
          TIKTOK_APP_KEY: ${{ secrets.TIKTOK_APP_KEY }}
          TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_SHOP_CIPHER: ${{ secrets.TIKTOK_SHOP_CIPHER }}
        run: |
          python - <<'PY'
          import os

          required = [
              "LIBRI_CUSTOMER_NUMBER",
              "LIBRI_USER",
              "LIBRI_PASS",
              "TIKTOK_APP_KEY",
              "TIKTOK_APP_SECRET",
          ]
          optional = ["TIKTOK_SHOP_CIPHER"]
          missing = [key for key in required if not os.environ.get(key)]
          if not os.environ.get("TIKTOK_ACCESS_TOKEN") and not os.environ.get("TIKTOK_REFRESH_TOKEN"):
              missing.append("TIKTOK_ACCESS_TOKEN or TIKTOK_REFRESH_TOKEN")
          missing_optional = [key for key in optional if not os.environ.get(key)]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"available={'false' if missing else 'true'}\n")

          if missing:
              print(
                  "::notice::TikTok order automation skipped because required GitHub Environment secrets "
                  f"are missing in environment 'shop': {', '.join(missing)}."
              )
              raise SystemExit(0)

          if missing_optional:
              print(
                  "::notice::Optional secret TIKTOK_SHOP_CIPHER is not set. The script will try to "
                  "detect the shop automatically."
              )
          PY

      - name: Create local env file
        if: steps.required-secrets.outputs.available == 'true'
        env:
          LIBRI_CUSTOMER_NUMBER: ${{ secrets.LIBRI_CUSTOMER_NUMBER }}
          LIBRI_USER: ${{ secrets.LIBRI_USERNAME }}
          LIBRI_PASS: ${{ secrets.LIBRI_PASSWORD }}
          LIBRI_DELIVERY_NOTE_URLS: ${{ secrets.LIBRI_DELIVERY_NOTE_URLS }}
          TIKTOK_APP_KEY: ${{ secrets.TIKTOK_APP_KEY }}
          TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_SHOP_CIPHER: ${{ secrets.TIKTOK_SHOP_CIPHER }}
          TIKTOK_WAREHOUSE_ID: ${{ secrets.TIKTOK_WAREHOUSE_ID }}
          TIKTOK_SHIPPING_PROVIDER_ID: ${{ secrets.TIKTOK_SHIPPING_PROVIDER_ID }}
          TIKTOK_SHIPPING_PROVIDER_NAME: ${{ secrets.TIKTOK_SHIPPING_PROVIDER_NAME }}
          TIKTOK_SHIP_PACKAGE_PATH_TEMPLATE: ${{ secrets.TIKTOK_SHIP_PACKAGE_PATH_TEMPLATE }}
          TIKTOK_AFFILIATE_AUDIT_PATHS: ${{ secrets.TIKTOK_AFFILIATE_AUDIT_PATHS }}
        run: |
          python - <<'PY'
          import os

          defaults = {
              "TIKTOK_BASE_URL": "https://open-api.tiktokglobalshop.com",
              "TIKTOK_API_VERSION": "202309",
              "TIKTOK_ORDER_STATUS": "AWAITING_SHIPMENT",
              "TIKTOK_INCLUDE_VERSION": "true",
              "TIKTOK_ACCESS_TOKEN_IN_QUERY": "false",
              "TIKTOK_SIGN_INCLUDE_BODY": "true",
              "TIKTOK_SHIPPING_PROVIDER_NAME": "DHL",
              "TIKTOK_SHIP_PACKAGE_PATH_TEMPLATE": "/fulfillment/{version}/packages/{package_id}/ship",
          }
          secret_keys = [
              "LIBRI_CUSTOMER_NUMBER",
              "LIBRI_DELIVERY_NOTE_URLS",
              "TIKTOK_APP_KEY",
              "TIKTOK_APP_SECRET",
              "TIKTOK_ACCESS_TOKEN",
              "TIKTOK_REFRESH_TOKEN",
              "TIKTOK_SHOP_CIPHER",
              "TIKTOK_WAREHOUSE_ID",
              "TIKTOK_SHIPPING_PROVIDER_ID",
              "TIKTOK_SHIPPING_PROVIDER_NAME",
              "TIKTOK_SHIP_PACKAGE_PATH_TEMPLATE",
              "TIKTOK_AFFILIATE_AUDIT_PATHS",
          ]

          with open(".env", "w", encoding="utf-8") as env_file:
              env_file.write(f"LIBRI_USERNAME={os.environ.get('LIBRI_USER', '')}\n")
              env_file.write(f"LIBRI_PASSWORD={os.environ.get('LIBRI_PASS', '')}\n")
              for key in secret_keys:
                  value = os.environ.get(key, "") or defaults.get(key, "")
                  env_file.write(f"{key}={value}\n")
              for key, value in defaults.items():
                  if key not in secret_keys:
                      env_file.write(f"{key}={value}\n")
          PY

      - name: Refresh TikTok access token
        if: steps.required-secrets.outputs.available == 'true'
        run: python scripts/refresh_tiktok_access_token.py --env .env

      - name: Audit TikTok and Libri integration
        id: integration-audit
        if: steps.required-secrets.outputs.available == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/tiktok_shop_integration_audit.py \
            --env .env \
            --output-root outputs/tiktok_shop_ops_audit

      - name: Prepare new orders
        if: steps.required-secrets.outputs.available == 'true'
        run: |
          python scripts/tiktok_order_automation_ci.py \
            --env .env \
            --output-root outputs/order_automation \
            --state .automation/order_state.json \
            --skip-empty-runs

      - name: Submit clean prepared orders to Libri
        id: libri-submit
        if: steps.required-secrets.outputs.available == 'true'
        continue-on-error: true
        run: |
          python scripts/submit_clean_prepared_libri_orders.py \
            --env .env \
            --state .automation/libri_order_state.json \
            --output-root outputs/order_automation

      - name: Check Libri delivery notes and update TikTok
        id: lieferschein-sync
        if: steps.required-secrets.outputs.available == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/libri_lieferschein_sync.py \
            --env .env \
            --state .automation/libri_order_state.json \
            --output-dir outputs/libri_lieferschein_sync \
            --update-tiktok \
            --create-issues

      - name: Check for prepared files
        id: prepared-files
        if: always() && steps.required-secrets.outputs.available == 'true'
        run: |
          if [ -d outputs/order_automation ] && find outputs/order_automation -mindepth 1 -maxdepth 1 -type d | grep -q .; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for Libri submission audit files
        id: libri-audits
        if: always() && steps.required-secrets.outputs.available == 'true'
        run: |
          if [ -d outputs/order_automation ] && find outputs/order_automation -path '*/libri_submission/*' -type f | grep -q .; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for Lieferschein sync audit files
        id: lieferschein-audits
        if: always() && steps.required-secrets.outputs.available == 'true'
        run: |
          if [ -d outputs/libri_lieferschein_sync ] && find outputs/libri_lieferschein_sync -type f | grep -q .; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for integration audit files
        id: integration-audits
        if: always() && steps.required-secrets.outputs.available == 'true'
        run: |
          if [ -d outputs/tiktok_shop_ops_audit ] && find outputs/tiktok_shop_ops_audit -type f | grep -q .; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload prepared Libri files
        if: steps.prepared-files.outputs.created == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: libri-order-packages-${{ github.run_id }}
          path: outputs/order_automation/
          retention-days: 14

      - name: Upload Libri submission audits
        if: steps.libri-audits.outputs.created == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: libri-submission-audits-${{ github.run_id }}
          path: outputs/order_automation/**/libri_submission/
          retention-days: 14

      - name: Upload Lieferschein sync audit
        if: steps.lieferschein-audits.outputs.created == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: libri-lieferschein-sync-${{ github.run_id }}
          path: outputs/libri_lieferschein_sync/
          retention-days: 14

      - name: Upload integration audit
        if: steps.integration-audits.outputs.created == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: tiktok-shop-integration-audit-${{ github.run_id }}
          path: outputs/tiktok_shop_ops_audit/
          retention-days: 14

      - name: Notify about prepared order package
        if: steps.prepared-files.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          owner = repo.split("/", 1)[0]
          run_id = os.environ["GITHUB_RUN_ID"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/actions/runs/{run_id}"
          artifact_name = f"libri-order-packages-{run_id}"

          payload = {
              "title": f"New TikTok order package prepared ({run_id})",
              "body": (
                  f"@{owner} a new TikTok order package is ready.\n\n"
                  f"Download the artifact `{artifact_name}` from this workflow run:\n"
                  f"{run_url}\n\n"
                  "This issue intentionally contains no customer address or order details. "
                  "Clean orders are submitted to Libri automatically; orders with warnings still need review."
              ),
          }
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json",
                  "User-Agent": "tiktok-order-automation",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              issue = json.loads(response.read().decode("utf-8"))
          print(f"Created notification issue: {issue['html_url']}")
          PY

      - name: Save automation state
        if: always() && steps.required-secrets.outputs.available == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .automation/order_state.json .automation/libri_order_state.json
          if git diff --cached --quiet; then
            echo "No automation-state changes."
            exit 0
          fi
          git commit -m "Update TikTok and Libri automation state"
          git pull --rebase
          git push
