name: TikTok inventory update

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch and compare quantities without writing to TikTok"
        type: boolean
        default: false
      limit:
        description: "Optional SKU limit for a manual run; 0 means no limit"
        type: number
        default: 0

concurrency:
  group: tiktok-inventory-update
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-inventory:
    runs-on: ubuntu-latest
    environment: shop
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create local env file
        env:
          LIBRI_CUSTOMER_NUMBER: ${{ secrets.LIBRI_CUSTOMER_NUMBER }}
          LIBRI_USERNAME: ${{ secrets.LIBRI_USERNAME }}
          LIBRI_PASSWORD: ${{ secrets.LIBRI_PASSWORD }}
          TIKTOK_APP_KEY: ${{ secrets.TIKTOK_APP_KEY }}
          TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_SHOP_CIPHER: ${{ secrets.TIKTOK_SHOP_CIPHER }}
          TIKTOK_WAREHOUSE_ID: ${{ secrets.TIKTOK_WAREHOUSE_ID }}
        run: |
          python - <<'PY'
          import os

          defaults = {
              "TIKTOK_BASE_URL": "https://open-api.tiktokglobalshop.com",
              "TIKTOK_API_VERSION": "202309",
              "TIKTOK_INCLUDE_VERSION": "true",
              "TIKTOK_ACCESS_TOKEN_IN_QUERY": "false",
              "TIKTOK_SIGN_INCLUDE_BODY": "true",
          }
          secret_keys = [
              "LIBRI_CUSTOMER_NUMBER",
              "LIBRI_USERNAME",
              "LIBRI_PASSWORD",
              "TIKTOK_APP_KEY",
              "TIKTOK_APP_SECRET",
              "TIKTOK_ACCESS_TOKEN",
              "TIKTOK_REFRESH_TOKEN",
              "TIKTOK_SHOP_CIPHER",
              "TIKTOK_WAREHOUSE_ID",
          ]

          with open(".env", "w", encoding="utf-8") as env_file:
              for key in secret_keys:
                  env_file.write(f"{key}={os.environ.get(key, '')}\n")
              for key, value in defaults.items():
                  env_file.write(f"{key}={value}\n")
          PY

      - name: Refresh TikTok access token
        run: python scripts/refresh_tiktok_access_token.py --env .env

      - name: Update quantities from Libri
        env:
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ inputs.dry_run || false }}
          LIMIT: ${{ inputs.limit || 0 }}
        run: |
          args=(
            "--env" ".env"
            "--output-root" "outputs/inventory_updates"
            "--product-statuses" "ACTIVATE,SELLER_DEACTIVATED"
          )

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN" = "true" ]; then
            args+=("--dry-run")
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$LIMIT" != "0" ]; then
            args+=("--limit" "$LIMIT")
          fi

          python scripts/update_tiktok_quantities_from_libri.py "${args[@]}"

      - name: Upload inventory update log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tiktok-inventory-update-${{ github.run_id }}
          path: outputs/inventory_updates/
          retention-days: 14
